<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理任务明细 | 作业时间估算</title>
<link rel="stylesheet" href="/css/bootstrap.min.css" crossorigin="anonymous">
<script src="/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <style>
        .padding-individual {
            padding-top: 40px;    /* 文字与上边框距离 */
            padding-right: 20px;  /* 文字与右边框距离 */
            padding-bottom: 20px; /* 文字与下边框距离 */
            padding-left: 20px;   /* 文字与左边框距离 */
        }
        .btn-add {
            background-color: rgb(129, 151, 206);
            color:rgb(255, 255, 255)
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-default">
        <div class="row">
            <div class="col-md-3"></div>
            <div class="col-md-6">
                <div class="container-fluid">
                    <div class="navbar-header">
                    <a class="navbar-brand" href="/">
                        <img alt="Brand" src="/img/logo.png" style="height: 25px;">
                    </a>
                    <p class="navbar-text navbar-left">作业时间估算</p>
                    </div>
                    <ul class="nav navbar-nav navbar-right">
                        <li><a href="/admin">管理</a></li>
                        <li><a href="/user/logout">登出</a></li>
                    </ul>
                </div>
            </div>
            <div class="col-md-3"></div>
        </div>
        
    </nav>

    <div class="col-md-3"></div>
    <div class="col-md-6">
        <h3 class="list-group-item-heading">管理 {{task_id}} 任务 - {{grade}} 年级 {{cls}} 班 : {{Sub}}</h3>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>内容</th>
                    <th>平均用时</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for x in task_list %}
                <tr>
                    <td>{{x[0]}}</td>
                    <td>{{x[1]}}</td>
                    <td>{{x[2]}}</td>
                    <td><a href="#" class="btn btn-xs btn-primary">编辑</a> 
                        <a href="#" class="btn btn-xs btn-danger">删除</a> 
                    </td>
                </tr>
                {%endfor%}
            </tbody>
        </table>
        <div class="btn-group" role="group">
            <a type="button" class="btn btn-primary">添加作业</a>
            <a type="button" class="btn btn-add btn-info">粘贴作业</a>
            <a type="button" class="btn btn-info">提示整改</a>
            <a href="/admin/task/{{task_id}}/information/{{grade}}/{{cls}}/{{sub}}/studentlist" type="button" class="btn btn-success">用时明细</a>
            <a type="button" class="btn btn-danger">删除作业</a>
        </div>

        <div style="text-align: center;">
            <a href="/admin/tasks" class="btn btn-default">返回任务列表</a>
        </div>

        <footer>
        <hr>
        <p>&copy; 2026 广州市第七中学. 保留所有权利.</p>
    </footer>
    </div>
    <div class="col-md-3"></div>
</body>
</html>
